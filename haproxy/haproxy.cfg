global
    maxconn 2000
    log stdout format raw local0 info

defaults
    log     global
    mode    tcp
    retries 2
    timeout client          30m
    timeout connect         4s
    timeout server          30m
    timeout check           5s

# ---------------------------------------------------------------------------
# Stats
# ---------------------------------------------------------------------------
listen stats
    mode    http
    bind    *:7000
    stats   enable
    stats   uri /
    stats   refresh 10s

# ---------------------------------------------------------------------------
# Postgres WRITE (port 5000) - always to the current Patroni leader
# Patroni REST returns HTTP 200 on /primary only on the leader, 503 otherwise.
# ---------------------------------------------------------------------------
listen postgres_write
    bind    *:5000
    option  httpchk GET /primary
    http-check expect status 200
    default-server inter 3s fall 3 rise 2 on-marked-down shutdown-sessions
    # >>> SERVERS_BEGIN >>>
    __SERVERS__
    # <<< SERVERS_END <<<

# ---------------------------------------------------------------------------
# Postgres READ-ONLY (port 5001) - load-balanced across replicas
# /replica = HTTP 200 on replica nodes (not on the leader)
# ---------------------------------------------------------------------------
listen postgres_read
    bind    *:5001
    balance roundrobin
    option  httpchk GET /replica
    http-check expect status 200
    default-server inter 3s fall 3 rise 2 on-marked-down shutdown-sessions
    # >>> SERVERS_BEGIN >>>
    __SERVERS__
    # <<< SERVERS_END <<<
