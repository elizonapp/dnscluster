# =============================================================================
# PowerDNS Authoritative - sized for hundreds of zones / thousands of records
# =============================================================================

# --- Listen ---
local-address=0.0.0.0
local-port=53

# --- API ---
# The API listens internally; PowerDNS-Admin talks to it via the Docker network.
# Public exposure should be ONLY via the authenticated UI (e.g. behind Caddy) -> do NOT expose 8081 publicly.
api=yes
api-key=${PDNS_API_KEY}
webserver=yes
webserver-address=0.0.0.0
webserver-port=8081
webserver-allow-from=0.0.0.0/0,::/0
webserver-password=${PDNS_API_KEY}

# --- Backend: gpgsql via PgBouncer ---
launch=gpgsql
gpgsql-host=pgbouncer
gpgsql-port=6432
gpgsql-dbname=pdns
gpgsql-user=pdns
gpgsql-password=${PDNS_DB_PASSWORD}
gpgsql-dnssec=yes
# PgBouncer can't do everything - disable prepared statements
gpgsql-prepared-statements=no

# --- Performance / caching ---
# For large setups (thousands of records), caching is a key lever.
receiver-threads=2
distributor-threads=4
# Packet cache: caches full response packets -> very fast
max-packet-cache-entries=2000000
# Query cache: caches individual DB answers
max-cache-entries=2000000
# Negative cache TTL (NXDOMAIN etc)
cache-ttl=120
negquery-cache-ttl=60
query-cache-ttl=60

# --- DNSSEC ---
# NOTE: This is a static PowerDNS setting (this file is templated only for secrets like
# PDNS_API_KEY / PDNS_DB_PASSWORD). If you rely on default-soa-content, adjust it to your
# own domain. Many setups explicitly set SOA values per zone instead.
default-soa-content=ns1.example.net hostmaster.example.net 0 10800 3600 604800 3600

# --- Primary/secondary (for additional external slaves via AXFR) ---
primary=yes
secondary=no
disable-axfr=no
allow-axfr-ips=10.100.0.0/24,127.0.0.1
also-notify=

# --- Logging ---
loglevel=4
log-dns-queries=no
log-dns-details=no

# --- Misc ---
version-string=anonymous
default-ttl=3600
