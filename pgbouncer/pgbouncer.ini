[databases]
# Only pdns (+ a read-only alias). Do not add additional DBs (e.g. powerdnsadmin)
# here without a dedicated entry. PowerDNS-Admin in Compose connects directly to
# haproxy:5000/powerdnsadmin (see docker-compose.yml).
# Write pool: always go via HAProxy:5000 -> current leader
pdns = host=haproxy port=5000 dbname=pdns user=pdns

# Read pool: via HAProxy:5001 -> replicas
pdns_ro = host=haproxy port=5001 dbname=pdns user=pdns

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432
auth_type = md5
# Bitnami container: config is mounted under /bitnami/pgbouncer/conf.
auth_file = /bitnami/pgbouncer/conf/userlist.txt

# transaction pooling: ideal for PowerDNS workload (short queries)
pool_mode = transaction
max_client_conn = 1000
default_pool_size = 50
reserve_pool_size = 10
reserve_pool_timeout = 3
server_lifetime = 3600
server_idle_timeout = 600

# Important during failover: rebuild connections cleanly
server_check_query = select 1
server_check_delay = 30
server_fast_close = 1

ignore_startup_parameters = extra_float_digits,search_path

admin_users = postgres
stats_users = postgres
